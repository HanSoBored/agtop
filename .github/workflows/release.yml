name: Release & Publish

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'VERSION'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]' | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check Tag
        id: check_tag
        run: |
          git fetch --tags
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Cross-Compiler Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28
          add-to-path: true

      - name: Build Linux Static Binary
        run: |
          mkdir -p dist
          # x86_64
          cd cmd/agtop/
          go build -ldflags="-s -w" -o ../../dist/agtop-linux-x86_64

          # aarch64 (static, no CGO)
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o ../../dist/agtop-linux-aarch64

          # armv7 (static, no CGO)
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -ldflags="-s -w" -o ../../dist/agtop-linux-armv7

      - name: Build Android Static Binary
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # aarch64
          cd cmd/agtop/
          CC=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang \
          CXX=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang++ \
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 go build -ldflags="-s -w" -o ../../dist/agtop-android-aarch64

          # armv7
          CC=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi33-clang \
          CXX=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi33-clang++ \
          CGO_ENABLED=1 GOOS=android GOARCH=arm GOARM=7 go build -ldflags="-s -w" -o ../../dist/agtop-android-armv7

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        id: git_cliff
        with:
          config: .github/external/cliff.toml
          args: --verbose --unreleased --tag v${{ needs.check-version.outputs.version }} --strip all
        env:
          OUTPUT: CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Release v${{ needs.check-version.outputs.version }}
          body: ${{ steps.git_cliff.outputs.content }}
          files: dist/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
